<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <meta property="og:title" content="" />
    <meta property="og:description" content="" />
    <meta property="og:image" content="" />
    <meta property="og:type" content="" />
    <meta name="twitter:card" content="" />
    <meta name="twitter:image" content="" />
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #111827;
        }

        iframe {
            border: none;
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>
    <iframe src="Code_bases/content.html" title="Digital Book Content"></iframe>
    <script src="Code_bases/content.js"></script>
    <script>
        // Update meta tags and title dynamically from bookConfig
        document.addEventListener('DOMContentLoaded', function() {
            // Set page title
            if (window.bookConfig && window.bookConfig.pageTitle) {
                document.title = window.bookConfig.pageTitle;
            }
            
            // Set OG meta tags
            const metaMappings = {
                'og:title': 'ogTitle',
                'og:description': 'ogDescription',
                'og:image': 'ogImage',
                'og:type': 'ogType'
            };
            
            Object.keys(metaMappings).forEach(property => {
                const configKey = metaMappings[property];
                const meta = document.querySelector(`meta[property="${property}"]`);
                if (meta && window.bookConfig && window.bookConfig[configKey]) {
                    meta.setAttribute('content', window.bookConfig[configKey]);
                }
            });
            
            // Set Twitter meta tags
            const twitterMappings = {
                'twitter:card': 'twitterCard',
                'twitter:image': 'ogImage'  // Use same as OG image
            };
            
            Object.keys(twitterMappings).forEach(name => {
                const configKey = twitterMappings[name];
                const meta = document.querySelector(`meta[name="${name}"]`);
                if (meta && window.bookConfig && window.bookConfig[configKey]) {
                    meta.setAttribute('content', window.bookConfig[configKey]);
                }
            });
        });
    </script>
</body>

</html>
